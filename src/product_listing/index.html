<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header">
    </header>
    <main class="divider">
      <h2 class="products-title">Top Products: <span id="category"></span></h2>
      <div class="sort-container">
        <label for="sort-products">Sort by:</label>
          <select id="sort-products">
             <option value="name-asc">Name (A-Z)</option>
             <option value="name-desc">Name (Z-A)</option>
             <option value="price-asc">Price (Low to High)</option>
             <option value="price-desc">Price (High to Low)</option>
         </select>
      </div>
      <ul class="product-list"></ul>
    </main>
    <footer id="main-footer">
    </footer>
    <script type="module" src="/js/product-listing.js"></script>
  </body>
</html>
